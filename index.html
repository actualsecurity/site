<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Actual Security — Cybersecurity, Physical Security, and Threat Intelligence">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self'; img-src 'self'; font-src 'self'; connect-src 'none'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()">
    <title>Actual Security</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scanlines"></div>
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span class="prompt">visitor@actualsecurity.com:~$&nbsp;</span>
            <input type="text" id="cmd-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
            <span id="cursor" class="blink">_</span>
        </div>
    </div>
    <script src="terminal.js"></script>
</body>
</html>
