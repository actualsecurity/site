<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Actual Security — Terminal">
    <meta name="theme-color" content="#0a0a0a">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' blob:; worker-src 'self' blob:; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'none';">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="no-referrer">
    <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), interest-cohort=()">
    <title>Actual Security — Terminal</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="scanlines"></div>

    <!-- Fake terminal -->
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span class="prompt">visitor@actualsecurity.org:~$&nbsp;</span>
            <input type="text" id="cmd-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus>
            <span id="cursor" class="blink">_</span>
        </div>
    </div>

    <!-- v86 VM overlay -->
    <div id="vm-overlay">
        <div id="vm-bar">
            <span class="vm-title">[ actualsecurity.org — live environment ]</span>
            <button id="vm-exit" title="Disconnect">disconnect</button>
        </div>
        <div id="vm-screen">
            <div id="vm-loading">Booting kernel...</div>
            <div id="vm-output"></div>
            <div id="screen_container">
                <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
                <canvas style="display: none"></canvas>
            </div>
        </div>
    </div>

    <script src="v86/libv86.js"></script>
    <script src="terminal.js"></script>
</body>
</html>
