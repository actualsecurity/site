<body>
    <noscript><div class="noscript-msg">This site requires JavaScript to function.</div></noscript>
    <div id="scanlines"></div>

    <!-- VM sandbox -->
    <div id="vm-overlay" class="active">
        <div id="vm-bar">
            <span class="vm-title">[ actualsecurity.org — sandbox ]</span>
            <a href="/" class="vm-back">back to site</a>
        </div>
        <div id="vm-notice">This is a real Linux VM running entirely in your browser. Nothing is sent to any server.</div>
        <div id="vm-screen">
            <div id="vm-loading">Booting kernel...</div>
            <div id="screen_container">
                <div style="white-space: pre; font: 14px monospace; line-height: 14px"></div>
                <canvas style="display: none"></canvas>
            </div>
        </div>
    </div>

    <script src="v86/libv86.js" defer></script>
    <script src="terminal.js" defer></script>
